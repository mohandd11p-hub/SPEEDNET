<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خريطة المشتركين مع المسار</title>
    <!-- ملفات Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .search-container { position: absolute; top: 10px; right: 10px; z-index: 1000; width: 80%; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="بحث عن اسم المشترك..." onkeyup="searchSubscriber()">
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([31.986, 44.920], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var routingControl = null;

        const subscribers = [
            { name: "أحمد علي", lat: 31.985, lng: 44.921, pole: "عمود 15" },
            { name: "حسين محمد", lat: 31.982, lng: 44.925, pole: "عمود 20" }
        ];

        // تفعيل تتبع موقعك الحالي
        map.locate({setView: false});
        let myLocation = null;
        map.on('locationfound', e => { myLocation = e.latlng; });

        function searchSubscriber() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            subscribers.forEach(user => {
                if (input !== "" && user.name.toLowerCase().includes(input)) {
                    showRoute(user);
                }
            });
        }

        function showRoute(user) {
            if (!myLocation) { alert("يرجى تفعيل الموقع (GPS) في هاتفك"); return; }
            
            // إزالة المسار القديم إذا وُجد
            if (routingControl) map.removeControl(routingControl);

            // رسم المسار من موقعي إلى بيت المشترك
            routingControl = L.Routing.control({
                waypoints: [myLocation, L.latLng(user.lat, user.lng)],
                routeWhileDragging: false,
                language: 'ar',
                show: true
            }).addTo(map);
        }
    </script>
</body>
</html>
