<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UROXA | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: sans-serif; }
        .chat-container { max-width: 700px; }
        .message-box { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .input-area { background: #202020; border-radius: 28px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-[700px] py-4">
        <h1 class="text-2xl font-bold text-white">UROXA</h1>
    </header>

    <div id="chat-window" class="chat-container w-full flex-1 overflow-y-auto mb-6">
        <div class="message-box">
            <p>أهلاً بك! أنا UROXA، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟</p>
        </div>
    </div>

    <div class="input-area w-full max-w-[700px] flex items-center p-2 mb-4 border border-zinc-700">
        <input id="user-input" type="text" placeholder="اكتب استفساراً..." 
               class="flex-1 bg-transparent p-3 outline-none text-white">
        <button id="send-btn" class="p-3 bg-white text-black rounded-full hover:bg-gray-200 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.429a1 1 0 001.169-1.409l-7-14z" />
            </svg>
        </button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function triggerResponse() {
            const message = input.value.trim();
            if (message === "") return;

            // 1. إضافة رسالة المستخدم
            chatWindow.innerHTML += `<div class="text-right p-4 font-bold text-white">${message}</div>`;
            input.value = "";

            // 2. الرد الآلي
            setTimeout(() => {
                chatWindow.innerHTML += `
                    <div class="message-box">
                        <p class="text-sky-400 font-bold mb-1">UROXA:</p>
                        <p>جاري معالجة طلبك بذكاء اصطناعي... لقد تلقيت استفسارك وسأقوم بالرد فوراً.</p>
                    </div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 600);
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', triggerResponse);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerResponse(); });
    </script>
</body>
</html>
