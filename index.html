<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صيانة الإنترنت الشاملة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        .btn-gps { background-color: #dc3545; }
        .btn-save { background-color: #28a745; }
        .btn-waze { background-color: #007bff; padding: 5px 10px; font-size: 14px; }
        .btn-del { background-color: #6c757d; padding: 5px 10px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        #mapContainer { height: 200px; width: 100%; margin-top: 10px; display: none; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>إدارة المشتركين</h2>

    <!-- لوحة الإضافة -->
    <div class="card">
        <input type="text" id="name" placeholder="اسم المشترك">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <input type="text" id="pole" placeholder="اسم العمود المفعّل">
        <label>تاريخ التفعيل:</label>
        <input type="date" id="start">
        <label>تاريخ الانتهاء:</label>
        <input type="date" id="end">
        
        <input type="text" id="lat" placeholder="خط العرض (تلقائي)" readonly style="background:#eee;">
        <input type="text" id="lng" placeholder="خط الطول (تلقائي)" readonly style="background:#eee;">

        <button onclick="getCurrentLocation()" class="btn btn-gps">📍 تحديد موقعي الحالي (GPS)</button>
        <button onclick="saveUser()" class="btn btn-save">💾 حفظ المشترك</button>
        <div id="mapContainer"></div>
    </div>

    <!-- جدول المشتركين -->
    <div class="card">
        <table>
            <thead>
                <tr><th>الاسم</th><th>العمود</th><th>التاريخ</th><th>أدوات</th></tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script>
        // إعداد الخريطة
        let map = L.map('mapContainer').setView([31.986, 44.920], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function getCurrentLocation() {
            document.getElementById('mapContainer').style.display = 'block';
            map.invalidateSize();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById('lat').value = lat.toFixed(6);
                    document.getElementById('lng').value = lng.toFixed(6);
                    map.setView([lat, lng], 18);
                    L.marker([lat, lng]).addTo(map).bindPopup("موقعك الحالي").openPopup();
                    alert("تم تحديد الموقع!");
                });
            }
        }

        function saveUser() {
            const user = {
                id: Date.now(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                pole: document.getElementById('pole').value,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                lat: document.getElementById('lat').value,
                lng: document.getElementById('lng').value
            };
            if(!user.name || !user.lat) { alert("أدخل الاسم وحدد الموقع!"); return; }
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push(user);
            localStorage.setItem('users', JSON.stringify(users));
            location.reload();
        }

        function render() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.name}<br>📞${u.phone}</td>
                    <td>${u.pole}</td>
                    <td><small>تفعيل: ${u.start}<br>انتهاء: ${u.end}</small></td>
                    <td>
                        <button onclick="window.location.href='waze://?ll=${u.lat},${u.lng}&navigate=yes'" class="btn btn-waze">🚗</button>
                        <button onclick="deleteUser(${u.id})" class="btn btn-del">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteUser(id) {
            let users = JSON.parse(localStorage.getItem('users'));
            users = users.filter(u => u.id !== id);
            localStorage.setItem('users', JSON.stringify(users));
            location.reload();
        }
        render();
    </script>
</body>
</html>
