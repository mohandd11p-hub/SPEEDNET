<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedPulse - فحص السرعة والعداد التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050a15;
            --card-bg: rgba(12, 22, 45, 0.85);
            --border: rgba(0, 229, 255, 0.25);
            --cyan: #00e5ff;
            --green: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .reload-btn {
            border: 2px solid var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.1);
            transition: all 0.2s ease;
        }
        .reload-btn:active { transform: scale(0.9); }

        /* تخصيص إبرة العداد */
        #needle {
            transform-origin: 100px 100px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #gaugeArc {
            transition: stroke-dashoffset 0.15s linear;
        }
    </style>
</head>
<body class="relative z-10 min-h-screen p-4 flex flex-col justify-between max-w-xl mx-auto w-full">
    <div class="bg-grid"></div>

    <header class="flex items-center justify-between pt-2 pb-2">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-cyan-400 orbitron">SpeedPulse</h1>
            <i class="fas fa-bolt text-cyan-400"></i>
        </div>
        
        <div class="text-left">
            <div id="liveClock" class="text-sm font-bold text-cyan-400 orbitron tracking-wider">--:--:--</div>
            <div id="liveDate" class="text-[10px] text-slate-400">جاري التحميل...</div>
        </div>

        <button onclick="triggerRestart()" class="reload-btn w-10 h-10 rounded-full flex items-center justify-center text-lg">
            <i class="fas fa-rotate-right" id="reloadIcon"></i>
        </button>
    </header>

    <main class="my-auto flex flex-col items-center justify-center text-center py-2">
        
        <div class="relative w-72 h-44 flex items-center justify-center">
            <svg class="w-full h-full" viewBox="0 0 200 120">
                <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12" stroke-linecap="round"/>
                
                <path id="gaugeArc" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linecap="round"
                      stroke-dasharray="251.2" stroke-dashoffset="251.2" />
                
                <g id="needle" transform="rotate(-90 100 100)">
                    <line x1="100" y1="100" x2="30" y2="100" stroke="#00e5ff" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="100" cy="100" r="7" fill="#00e5ff" stroke="#050a15" stroke-width="2"/>
                </g>

                <defs>
                    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#00e5ff" />
                        <stop offset="100%" stop-color="#00ff88" />
                    </linearGradient>
                </defs>
            </svg>

            <div class="absolute bottom-1 flex flex-col items-center">
                <span id="speedVal" class="text-4xl font-black text-cyan-400 orbitron">0.0</span>
                <span class="text-xs font-bold text-slate-400 orbitron">Mbps</span>
            </div>
        </div>

        <span id="statusBadge" class="text-[10px] text-amber-400 font-bold bg-amber-950/60 px-3 py-1 rounded-full border border-amber-500/30 my-2">جاري الفحص...</span>

        <div class="w-full max-w-xs bg-slate-900 rounded-full h-1.5 mb-6 overflow-hidden border border-slate-800">
            <div id="progressBar" class="bg-cyan-400 h-full w-0 transition-all duration-100"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 w-full">
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-arrow-up text-emerald-400 ml-1"></i>الرفع</div>
                <div id="ulVal" class="text-lg font-bold text-emerald-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">Mbps</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-stopwatch text-amber-400 ml-1"></i>البينغ</div>
                <div id="pingVal" class="text-lg font-bold text-amber-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-wave-square text-purple-400 ml-1"></i>الاهتزاز</div>
                <div id="jitterVal" class="text-lg font-bold text-purple-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
        </div>

        <div class="glass-card p-3 w-full mt-3 text-xs text-right space-y-1.5">
            <div class="flex justify-between items-center text-slate-400">
                <span>الموقع (المدينة - الدولة):</span>
                <span id="locationVal" class="text-cyan-400 font-bold">جاري التحديد...</span>
            </div>
            <div class="flex justify-between items-center text-slate-400">
                <span>المزود (ISP):</span>
                <span id="ispVal" class="text-slate-20
