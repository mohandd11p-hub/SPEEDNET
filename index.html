<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطقس ومواقيت الصلاة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الخلفية والخط */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تصميم القمر والشهب */
        .moon {
            position: absolute;
            top: 50px;
            right: 80px;
            width: 80px;
            height: 80px;
            background: #f1f1f1;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(241, 241, 241, 0.6), inset 15px -15px 0 rgba(200, 200, 200, 0.5);
            z-index: 1;
        }

        #meteors-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .meteor {
            position: absolute;
            background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            width: 100px;
            height: 2px;
            transform: rotate(-45deg);
            opacity: 0;
            animation: shoot linear infinite;
        }

        @keyframes shoot {
            0% { transform: translate(-100px, -100px) rotate(-45deg); opacity: 1; }
            100% { transform: translate(calc(100vw + 100px), calc(100vh + 100px)) rotate(-45deg); opacity: 0; }
        }

        /* تصميم الحاوية الزجاجية الاحترافية */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }

        /* تنسيق النصوص والعناوين */
        h2, h3 { margin-top: 0; font-weight: 700; color: #e0e0e0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; }
        .highlight { font-weight: 700; color: #4facfe; }

        /* توقعات 7 أيام */
        .forecast-container { display: flex; flex-direction: column; gap: 10px; }
        .forecast-day { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; }
        
        /* مواقيت الصلاة */
        .prayer-times { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .prayer-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; }
        .prayer-name { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }
        .prayer-time { font-size: 1.2rem; font-weight: 700; }

        /* استجابة الشاشات الصغيرة (الجوال) */
        @media (max-width: 768px) {
            .glass-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div id="meteors-container"></div>

    <div class="glass-panel" id="main-content">
        <div style="text-align: center; grid-column: 1 / -1;">
            <h2 id="location-name">جاري تحديد الموقع... 🌍</h2>
            <p id="current-datetime" style="color: #aaa;"></p>
        </div>

        <div>
            <h3>الطقس الحالي</h3>
            <div class="info-row"><span>درجة الحرارة:</span> <span class="highlight" id="current-temp">-</span></div>
            <div class="info-row"><span>سرعة الرياح:</span> <span class="highlight" id="current-wind">-</span></div>
            <br>
            <h3>مواقيت الصلاة</h3>
            <div class="prayer-times" id="prayer-container">
                جاري التحميل...
            </div>
        </div>

        <div>
            <h3>توقعات الأيام القادمة</h3>
            <div class="forecast-container" id="forecast-container">
                جاري التحميل...
            </div>
        </div>
    </div>

    <script>
        // 1. نظام الشهب
        function createMeteor() {
            const container = document.getElementById('meteors-container');
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            meteor.style.left = Math.random() * window.innerWidth + 'px';
            meteor.style.top = (Math.random() * window.innerHeight * 0.5 - 100) + 'px';
            meteor.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(meteor);
            setTimeout(() => meteor.remove(), 3500);
        }
        setInterval(createMeteor, 1200);

        // 2. تحديث الوقت
        setInterval(() => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-datetime').innerText = new Date().toLocaleDateString('ar-IQ', options);
        }, 1000);

        // 3. جلب البيانات (الطقس + الصلاة)
        async function fetchAllData(lat, lon) {
            try {
                // جلب الطقس لتسعة أيام (لضمان وجود 7 أيام قادمة)
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
                const weatherData = await weatherRes.json();
                
                document.getElementById('location-name').innerText = "بيانات منطقتك الحالية 📍";
                document.getElementById('current-temp').innerText = weatherData.current_weather.temperature + " °C";
                document.getElementById('current-wind').innerText = weatherData.current_weather.windspeed + " كم/س";

                // بناء توقعات 7 أيام
                let forecastHTML = '';
                const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                for(let i = 1; i <= 7; i++) {
                    const date = new Date(weatherData.daily.time[i]);
                    const dayName = days[date.getDay()];
                    const maxT = weatherData.daily.temperature_2m_max[i];
                    const minT = weatherData.daily.temperature_2m_min[i];
                    forecastHTML += `<div class="forecast-day"><span>${dayName}</span> <span>${maxT}° / <span style="color:#aaa">${minT}°</span></span></div>`;
                }
                document.getElementById('forecast-container').innerHTML = forecastHTML;

                // جلب مواقيت الصلاة
                const prayerRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=4`);
                const prayerData = await prayerRes.json();
                const timings = prayerData.data.timings;
                
                const prayersToDisplay = { 'Fajr': 'الفجر', 'Sunrise': 'الشروق', 'Dhuhr': 'الظهر', 'Asr': 'العصر', 'Maghrib': 'المغرب', 'Isha': 'العشاء' };
                let prayerHTML = '';
                for (const [key, arName] of Object.entries(prayersToDisplay)) {
                    prayerHTML += `<div class="prayer-card"><div class="prayer-name">${arName}</div><div class="prayer-time">${timings[key]}</div></div>`;
                }
                document.getElementById('prayer-container').innerHTML = prayerHTML;

            } catch (error) {
                document.getElementById('location-name').innerText = "حدث خطأ في جلب البيانات.";
            }
        }

        // 4. تحديد الموقع
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchAllData(pos.coords.latitude, pos.coords.longitude),
                (err) => fetchAllData(31.9922, 44.9258) // الديوانية كافتراضي
            );
        } else {
            fetchAllData(31.9922, 44.9258);
        }
    </script>
</body>
</html>
