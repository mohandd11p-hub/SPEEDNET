<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FTTH - إدارة الشبكة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #00d2ff; --danger: #e63946; --success: #2a9d8f; --warning: #f4a261; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; color: #333; }
        
        /* Header & Branding */
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .ftth-icon { width: 50px; height: 50px; fill: var(--accent); margin-bottom: 5px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 5px solid var(--primary); }
        
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-top: 8px; transition: 0.3s; }
        .btn-gps { background-color: var(--primary); }
        .btn-save { background-color: var(--success); }
        .btn-map { background-color: #4285F4; padding: 8px 12px; font-size: 13px; }
        .btn-del { background-color: var(--danger); padding: 8px 12px; font-size: 13px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 14px; }
        th { background: #f8f9fa; padding: 12px; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        
        .badge { font-weight: bold; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="header">
        <svg class="ftth-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
        <h2 style="margin:0;">إدارة شبكة FTTH</h2>
    </div>

    <!-- البحث -->
    <input type="text" id="searchInput" placeholder="🔍 بحث عن مشترك..." onkeyup="renderTable()" style="border: 2px solid var(--primary);">

    <!-- الإدخال -->
    <div class="card">
        <input type="text" id="name" placeholder="اسم المشترك">
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <input type="text" id="pole" placeholder="اسم العمود">
        <div style="display: flex; gap: 10px;">
            <input type="date" id="start" style="width:50%" title="تاريخ التفعيل">
            <input type="date" id="end" style="width:50%" title="تاريخ الانتهاء">
        </div>
        <input type="text" id="lat" placeholder="إحداثيات الموقع (GPS)" readonly style="background:#f9f9f9;">
        <button onclick="getCurrentLocation()" class="btn btn-gps">📍 التقاط موقعي (GPS)</button>
        <button onclick="saveUser()" class="btn btn-save">💾 حفظ المشترك</button>
    </div>

    <!-- الجدول -->
    <div class="card">
        <table>
            <thead><tr><th>المشترك</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script>
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('lat').value = `${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
                    alert("✅ تم تحديد الموقع");
                });
            } else { alert("GPS غير مدعوم"); }
        }

        function saveUser() {
            const u = {
                id: Date.now(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                pole: document.getElementById('pole').value,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                lat: document.getElementById('lat').value
            };
            if(!u.name || !u.lat) { alert("⚠️ أدخل الاسم وحدد الموقع!"); return; }
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push(u);
            localStorage.setItem('users', JSON.stringify(users));
            location.reload();
        }

        function renderTable() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const tbody = document.getElementById('userTable');
            const today = new Date();

            tbody.innerHTML = users.filter(u => u.name.toLowerCase().includes(filter)).map(u => {
                const diff = Math.ceil((new Date(u.end) - today) / (1000 * 60 * 60 * 24));
                const color = diff < 0 ? 'var(--danger)' : diff <= 3 ? 'var(--warning)' : 'var(--success)';
                const text = diff < 0 ? 'منتهي' : diff + ' يوم';
                
                return `<tr>
                    <td><strong>${u.name}</strong><br><small>📞 ${u.phone} | عمود: ${u.pole}</small></td>
                    <td><span class="badge" style="color:${color}">${text}</span></td>
                    <td>
                        <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${u.lat}')" class="btn btn-map">🗺️</button>
                        <button onclick="deleteUser(${u.id})" class="btn btn-del">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function deleteUser(id) {
            if(confirm("حذف المشترك؟")) {
                let users = JSON.parse(localStorage.getItem('users')).filter(u => u.id !== id);
                localStorage.setItem('users', JSON.stringify(users));
                renderTable();
            }
        }
        renderTable();
    </script>
</body>
</html>
