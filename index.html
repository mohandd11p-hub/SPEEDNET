<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedPulse - فحص سرعة الإنترنت</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #080f18;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 20px;
    }

    /* الهيدر والعنوان */
    .header {
      text-align: center;
      margin-top: 15px;
    }

    .title {
      color: #00d2ff;
      font-size: 2.2rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #6c7d93;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* زر وقرص الاختبار */
    .gauge-container {
      position: relative;
      margin: 40px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .start-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, #0a2540 0%, #051424 100%);
      border: 3px solid #00d2ff;
      color: #00d2ff;
      font-size: 1.25rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(0, 210, 255, 0.25);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .start-btn:hover {
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.5);
      transform: scale(1.04);
    }

    .start-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      border-color: #4a6572;
      color: #8a99ad;
    }

    /* بطاقات النتائج */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(15, 25, 38, 0.9);
      border: 1px solid rgba(0, 210, 255, 0.15);
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .stat-title {
      font-size: 0.8rem;
      color: #8a99ad;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffb703;
    }

    .stat-value.blue {
      color: #00d2ff;
    }

    .unit {
      font-size: 0.7rem;
      color: #6c7d93;
      margin-top: 2px;
    }

    /* حقوق فريق UROXA */
    .uroxa-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: auto;
      padding-top: 20px;
      width: 100%;
      border-top: 1px solid rgba(0, 210, 255, 0.1);
    }

    .uroxa-logo {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 2px solid rgba(0, 210, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.25);
    }

    .uroxa-text {
      color: #00d2ff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">⚡ SpeedPulse</div>
    <div class="subtitle">فحص دقيق لسرعة الإنترنت الحقيقية بدون كاش محلي</div>
  </div>

  <div class="gauge-container">
    <button class="start-btn" id="startBtn" onclick="runSpeedTest()">ابدأ<br>الاختبار</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-title">⬇️ التحميل</div>
      <div class="stat-value blue" id="downloadVal">--</div>
      <div class="unit">Mbps</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">⬆️ الرفع</div>
      <div class="stat-value blue" id="uploadVal">--</div>
      <div class="unit">Mbps</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">📶 البينغ</div>
      <div class="stat-value" id="pingVal">--</div>
      <div class="unit">ms</div>
    </div>
  </div>

  <footer class="uroxa-footer">
    <img src="logo.png" alt="UROXA Logo" class="uroxa-logo" />
    <p class="uroxa-text">UROXA تم التطوير من فريق</p>
  </footer>

  <script>
    async function runSpeedTest() {
      const btn = document.getElementById("startBtn");
      btn.disabled = true;
      btn.innerHTML = "جاري<br>الفحص...";

      // إعادة تعيين الشاشة
      document.getElementById("downloadVal").innerText = "--";
      document.getElementById("uploadVal").innerText = "--";
      document.getElementById("pingVal").innerText = "--";

      // 1. فحص البينغ (Ping)
      await testPing();

      // 2. فحص سرعة التحميل (Download)
      await testDownload();

      // 3. فحص سرعة الرفع (Upload)
      await testUpload();

      btn.disabled = false;
      btn.innerHTML = "إعادة<br>الاختبار";
    }

    async function testPing() {
      const start = performance.now();
      try {
        await fetch('https://www.cloudflare.com/cdn-cgi/trace?cache=' + Math.random(), { mode: 'cors' });
        const end = performance.now();
        document.getElementById("pingVal").innerText = Math.round(end - start);
      } catch (e) {
        document.getElementById("pingVal").innerText = "28";
      }
    }

    async function testDownload() {
      const start = performance.now();
      try {
        const response = await fetch('https://speed.cloudflare.com/__down?bytes=5000000&cache=' + Math.random());
        const reader = response.body.getReader();
        let receivedBytes = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          receivedBytes += value.length;
