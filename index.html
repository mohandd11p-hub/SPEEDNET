<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتركين - صيانة</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .tabs { display: flex; background: #333; color: white; }
        .tab { padding: 15px; cursor: pointer; flex: 1; text-align: center; }
        .tab.active { background: #007bff; }
        #map { height: 80vh; width: 100%; display: none; }
        #admin { padding: 20px; display: none; }
        #map.active, #admin.active { display: block; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #ddd; padding: 8px; text-align: right; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="showTab('map')">الخريطة</div>
    <div class="tab" onclick="showTab('admin')">لوحة التحكم</div>
</div>

<!-- تبويب الخريطة -->
<div id="map" class="active"></div>

<!-- تبويب التحكم -->
<div id="admin">
    <h3>إضافة مشترك جديد</h3>
    <input type="text" id="name" placeholder="اسم المشترك">
    <input type="text" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="pole" placeholder="العمود/النقطة">
    <input type="text" id="lat" placeholder="خط العرض (سيُملأ تلقائياً عند الضغط على الخريطة)">
    <input type="text" id="lng" placeholder="خط الطول (سيُملأ تلقائياً عند الضغط على الخريطة)">
    <button onclick="saveUser()">حفظ المشترك</button>
    <hr>
    <table>
        <thead><tr><th>الاسم</th><th>العمليات</th></tr></thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
    var map = L.map('map').setView([31.986, 44.920], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let users = JSON.parse(localStorage.getItem('myUsers')) || [];

    // إضافة ماركر عند الضغط على الخريطة لأخذ الإحداثيات
    map.on('click', function(e) {
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lng').value = e.latlng.lng;
        alert("تم تحديد الموقع! انتقل للوحة التحكم لحفظ الاسم.");
        showTab('admin');
    });

    function saveUser() {
        const user = {
            id: Date.now(),
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            pole: document.getElementById('pole').value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value
        };
        users.push(user);
        localStorage.setItem('myUsers', JSON.stringify(users));
        location.reload();
    }

    function deleteUser(id) {
        users = users.filter(u => u.id !== id);
        localStorage.setItem('myUsers', JSON.stringify(users));
        location.reload();
    }

    function showTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('map').classList.remove('active');
        document.getElementById('admin').classList.remove('active');
        
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
        
        if(tabName === 'map') renderMarkers();
    }

    function renderMarkers() {
        users.forEach(u => {
            L.marker([u.lat, u.lng]).addTo(map).bindPopup(`<b>${u.name}</b><br>${u.pole}`);
        });
    }

    // عرض قائمة المستخدمين في لوحة التحكم
    const table = document.getElementById('userTable');
    users.forEach(u => {
        table.innerHTML += `<tr><td>${u.name}</td><td><button onclick="deleteUser(${u.id})">حذف</button></td></tr>`;
    });
</script>
</body>
</html>
