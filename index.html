<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UROXA | AI Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .glass-ui { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(15px); border: 1px solid #333; }
        .ai-border { border: 1px solid #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-lg mb-6 flex justify-between items-center">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-emerald-400">UROXA</h1>
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
    </header>

    <div class="glass-ui w-full max-w-lg p-6 rounded-3xl ai-border">
        
        <div class="flex gap-2 mb-6 bg-black p-1 rounded-full border border-zinc-800">
            <button onclick="switchTab('chat')" class="flex-1 py-2 rounded-full bg-zinc-800 text-sm">الدردشة</button>
            <button onclick="switchTab('speed')" class="flex-1 py-2 rounded-full text-sm">السرعة</button>
        </div>

        <div id="content" class="h-80 overflow-y-auto">
            <p class="text-center text-zinc-500 mt-20">مرحباً بك في UROXA، ابدأ أي مهمة من الأعلى.</p>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const content = document.getElementById('content');
            if(tab === 'chat') {
                content.innerHTML = `<div class="p-4 bg-zinc-900 rounded-2xl">UROXA: كيف يمكنني تحليل بياناتك اليوم؟</div>`;
            } else {
                content.innerHTML = `<div class="text-center mt-10">
                    <div class="text-5xl font-black text-sky-500">0.0</div>
                    <p class="text-sm mt-2">جاري فحص النطاق الترددي...</p>
                </div>`;
            }
        }
    </script>
</body>
</html>
