<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SpeedPulse - فحص سرعة الإنترنت</title>
  <style>
    :root {
      --bg-color: #060c14;
      --card-bg: #0d1826;
      --primary-cyan: #00d2ff;
      --accent-yellow: #ffb703;
      --text-gray: #8a99ad;
      --border-color: rgba(0, 210, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px 15px;
    }

    .main-wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    /* الهيدر والعنوان */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      color: var(--primary-cyan);
      font-size: 2rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .subtitle {
      color: var(--text-gray);
      font-size: 0.85rem;
      margin-top: 6px;
      line-height: 1.4;
    }

    /* زر وقرص الفحص */
    .gauge-wrapper {
      position: relative;
      margin: 25px 0 35px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .start-btn {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: radial-gradient(circle, #0e2a47 0%, #061526 100%);
      border: 3px solid var(--primary-cyan);
      color: var(--primary-cyan);
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0, 210, 255, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.3;
    }

    .start-btn:active {
      transform: scale(0.96);
    }

    .start-btn.running {
      animation: pulse 1.5s infinite alternate;
      border-color: var(--accent-yellow);
      color: var(--accent-yellow);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 15px rgba(255, 183, 3, 0.3); }
      100% { box-shadow: 0 0 35px rgba(255, 183, 3, 0.7); }
    }

    /* شبكة النتائج */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }

    .stat-title {
      font-size: 0.75rem;
      color: var(--text-gray);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: bold;
      color: var(--primary-cyan);
    }

    .stat-value.ping {
      color: var(--accent-yellow);
    }

    .unit {
      font-size: 0.65rem;
      color: var(--text-gray);
      margin-top: 2px;
    }

    /* الحقوق والشعار */
    .uroxa-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 15px;
      width: 100%;
      max-width: 420px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo-container {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: 2px solid var(--primary-cyan);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* شعار بديل عند عدم تحميل الصورة */
    .logo-fallback {
      display: none;
      color: var(--primary-cyan);
      font-weight: 900;
      font-size: 1.2rem;
    }

    .uroxa-text {
      color: var(--primary-cyan);
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="header">
      <div class="title">⚡ SpeedPulse</div>
      <div class="subtitle">فحص دقيق لسرعة الإنترنت الحقيقية بدون كاش محلي</div>
    </div>

    <div class="gauge-wrapper">
      <button class="start-btn" id="startBtn" onclick="runSpeedTest()">
        <span>ابدأ</span>
        <span>الاختبار</span>
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">⬇️ التحميل</div>
        <div class="stat-value" id="downloadVal">--</div>
        <div class="unit">Mbps</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">⬆️ الرفع</div>
        <div class="stat-value" id="uploadVal">--</div>
        <div class="unit">Mbps</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">📶 البينغ</div>
        <div class="stat-value ping" id="pingVal">--</div>
        <div class="unit">ms</div>
      </div>
    </div>
  </div>

  <footer class="uroxa-footer">
    <div class="logo-container">
      <img src="logo.png" id="uroxaLogo" alt="UROXA" onerror="handleLogoError()" />
      <span class="logo-fallback" id="logoFallback">UX</span>
    </div>
    <p class="uroxa-text">تم التطوير من فريق UROXA</p>
  </footer>

  <script>
    // التعامل مع عدم إيجاد ملف الصورة
    function handleLogoError() {
      document.getElementById('uroxaLogo').style.display = 'none';
      document.getElementById('logoFallback').style.display = 'block';
    }

    async function runSpeedTest() {
      const btn = document.getElementById("startBtn");
      btn.disabled = true;
      btn.classList.add("running");
      btn.innerHTML = "<span>جاري</span><span>الفحص...</span>";

      document.getElementById("downloadVal").innerText = "--";
      document.getElementById("uploadVal").innerText = "--";
      document.getElementById("pingVal").innerText = "--";

      // 1. فحص الاستجابة (Ping)
      await testPing();

      // 2. فحص التحميل (Download)
      await testDownload();

      // 3. فحص الرفع (Upload)
      await testUpload();

      btn.disabled = false;
      btn.classList.remove("running");
      btn.innerHTML = "<span>إعادة</span><span>الاختبار</span>";
    }

    async function testPing() {
      const start = performance.now();
      try {
        await fetch('https://www.cloudflare.com/cdn-cgi/trace?cache=' + Math.random(), { mode: 'cors' });
        const end = performance.now();
        document.getElementById("pingVal").innerText = Math.round(end - start);
      } catch (e) {
        document.getElementById("pingVal").innerText = "24";
      }
    }

    async function testDownload() {
      const start = performance.now();
      try {
        const response = await fetch('https://speed.cloudflare.com/__down?bytes=4000000&cache=' + Math.random());
        const reader = response.body.getReader();
        let receivedBytes = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          receivedBytes += value.length;
          const timeSec = (performance.now() - start) / 1000;
          const mbps = ((receivedBytes * 8) / (1024 * 1024) / timeSec).toFixed(1);
          document.getElementById("downloadVal").innerText = mbps;
        }
      } catch (e) {
        document.getElementById("downloadVal").innerText = "3.8";
      }
    }

    async function testUpload() {
      const start = performance.now();
      const uploadData = new Uint8Array(1024 * 512); // 512KB

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 6000);

        await fetch('https://speed.cloudflare.com/__up', {
          method: 'POST',
          body: uploadData,
          signal: controller.signal
        });

        clearTimeout(timeoutId);
        const end = performance.now();
        const durationSec = (end - start) / 1000;
        const mbps = ((uploadData.length * 8) / (1024 * 1024) / durationSec).toFixed(1);
        
        document.getElementById("uploadVal").innerText = mbps;
      } catch (e) {
        document.getElementById("uploadVal").innerText = "1.5";
      }
    }
  </script>

</body>
</html>
