<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطقس الليلي وشهب متساقطة</title>
    <style>
        /* 1. تصميم الخلفية الليلية والعناصر البصرية */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* أسود ليلي غامق */
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* لمنع ظهور شريط التمرير أثناء سقوط الشهب */
            height: 100vh;
            position: relative;
        }

        /* تصميم القمر */
        .moon {
            position: absolute;
            top: 50px;
            right: 80px;
            width: 100px;
            height: 100px;
            background: #f1f1f1;
            border-radius: 50%;
            box-shadow: 0 0 30px #f1f1f1, inset 10px -10px 0 #d9d9d9;
            z-index: 1;
        }

        /* حاوية الشهب */
        #meteors-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* لضمان عدم تداخل الشهب مع عناصر واجهة المستخدم */
            z-index: 2;
        }

        /* تصميم الشهاب الواحد */
        .meteor {
            position: absolute;
            background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            width: 150px;
            height: 2px;
            transform: rotate(-45deg); /* زاوية السقوط */
            opacity: 0;
            animation: shoot 3s ease-out infinite;
        }

        /* حركة الشهاب المتساقط */
        @keyframes shoot {
            0% {
                transform: translate(-150px, -150px) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translate(calc(100vw + 150px), calc(100vh + 150px)) rotate(-45deg);
                opacity: 0;
            }
        }

        /* 2. تصميم أداة الطقس المدمجة */
        #weather-container {
            position: relative;
            z-index: 10; /* لضمان ظهورها فوق القمر والشهب */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #weather-widget {
            font-family: inherit;
            color: white;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1); /* خلفية شفافة ليلية */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
            backdrop-filter: blur(5px); /* تأثير ضبابي خلف الأداة */
        }

        #weather-widget h3 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        #weather-widget p {
            margin: 10px 0;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #weather-widget strong {
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <div class="moon"></div>
    <div id="meteors-container"></div>

    <div id="weather-container">
        <div id="weather-widget">
            <h3 id="location-name">جاري تحديد موقعك وجلب البيانات... 🌍</h3>
            <p><span>🕒 الوقت والتاريخ:</span> <strong id="current-datetime">-</strong></p>
            <p><span>🌡️ درجة الحرارة:</span> <strong id="current-temp">-</strong></p>
            <p><span>💨 سرعة الرياح:</span> <strong id="current-wind">-</strong></p>
            <p><span>🌧️ هطول الأمطار:</span> <strong id="current-rain">-</strong></p>
        </div>
    </div>

    <script>
        // 1. منطق الشهب المتساقطة (توليد عشوائي)
        const container = document.getElementById('meteors-container');
        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            
            // تحديد مكان البدء عشوائياً في الجزء العلوي أو الأيسر
            const startX = Math.random() * window.innerWidth * 0.8; 
            const startY = Math.random() * window.innerHeight * 0.5 - 200; // يبدأ من خارج الشاشة قليلاً

            meteor.style.left = startX + 'px';
            meteor.style.top = startY + 'px';
            
            // مدة أنيميشن وتأخير عشوائي
            const duration = Math.random() * 2 + 2; // بين 2 و 4 ثواني
            const delay = Math.random() * 5; // تأخير عشوائي لبدء السقوط

            meteor.style.animationDuration = duration + 's';
            meteor.style.animationDelay = delay + 's';

            container.appendChild(meteor);

            // إزالة عنصر الشهاب بعد انتهاء الأنيميشن لتوفير الذاكرة
            setTimeout(() => {
                meteor.remove();
            }, (duration + delay) * 1000);
        }

        // إنشاء شهاب جديد بانتظام
        setInterval(createMeteor, 1000); // إنشاء شهاب كل ثانية تقريباً

        // 2. منطق الطقس (باستخدام تحديد الموقع الجغرافي و API مجاني)
        // أ. تحديث الوقت والتاريخ بشكل حي
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-datetime').innerText = now.toLocaleDateString('ar-IQ', options);
        }
        setInterval(updateDateTime, 1000); 
        updateDateTime();

        // ب. دالة لجلب الطقس بناءً على الإحداثيات من API مجاني
        async function fetchWeather(lat, lon) {
            try {
                // واجهة برمجة تطبيقات الطقس المجانية (Open-Meteo)
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability&timezone=auto`);
                const data = await response.json();

                document.getElementById('location-name').innerText = "طقس منطقتك الحالية 📍";
                document.getElementById('current-temp').innerText = data.current_weather.temperature + " °C";
                document.getElementById('current-wind').innerText = data.current_weather.windspeed + " كم/ساعة";
                
                // جلب نسبة هطول الأمطار للساعة الحالية
                const currentHourIndex = new Date().getHours();
                const rainChance = data.hourly.precipitation_probability[currentHourIndex];
                document.getElementById('current-rain').innerText = rainChance + " %";

            } catch (error) {
                document.getElementById('location-name').innerText = "عذراً، حدث خطأ أثناء جلب بيانات الطقس.";
                console.error("Weather Fetch Error: ", error);
            }
        }

        // ج. استخدام GPS لتحديد موقع الزائر تلقائياً لعرض طقس محافظته
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchWeather(lat, lon);
                    },
                    (error) => {
                        // في حال رفض الزائر إعطاء الصلاحية، نستخدم طقس الديوانية كافتراضي
                        document.getElementById('location-name').innerText = "لم يتم تحديد الموقع (الطقس الافتراضي للمحافظة)";
                        fetchWeather(31.9922, 44.9258); // إحداثيات الديوانية
                    }
                );
            } else {
                document.getElementById('location-name').innerText = "متصفحك لا يدعم تحديد الموقع.";
                // الطقس الافتراضي
                fetchWeather(31.9922, 44.9258);
            }
        }

        // بدء العملية
        getUserLocation();

    </script>
</body>
</html>
