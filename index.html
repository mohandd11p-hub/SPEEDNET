<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedPulse - الفحص المستقر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050a15;
            --card-bg: rgba(12, 22, 45, 0.85);
            --border: rgba(0, 229, 255, 0.25);
            --cyan: #00e5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* الرقم التفاعلي */
        .live-number {
            font-size: clamp(4.5rem, 16vw, 7rem);
            line-height: 1;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transition: color 0.2s ease;
        }
        
        .live-number.pulse {
            animation: glowPulse 0.8s infinite alternate;
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }
            to { text-shadow: 0 0 30px rgba(0, 229, 255, 0.8); }
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
    </style>
</head>
<body class="relative z-10 min-h-screen p-4 flex flex-col justify-between max-w-xl mx-auto w-full">
    <div class="bg-grid"></div>

    <header class="flex items-center justify-between pt-2 pb-4">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-cyan-400 orbitron">SpeedPulse</h1>
            <i class="fas fa-bolt text-cyan-400"></i>
        </div>
        <button onclick="startTestEngine()" class="w-10 h-10 rounded-full border-2 border-cyan-400 text-cyan-400 bg-cyan-900/20 flex items-center justify-center active:scale-90 transition-transform">
            <i class="fas fa-rotate-right" id="reloadIcon"></i>
        </button>
    </header>

    <main class="my-auto flex flex-col items-center justify-center text-center py-4">
        <p class="text-xs text-slate-400 mb-2 font-bold tracking-widest uppercase">سرعة التنزيل الحالية</p>
        
        <div class="flex items-baseline justify-center gap-2 my-2">
            <span id="speedVal" class="live-number orbitron">0.0</span>
            <div class="text-right">
                <span class="block text-xl font-extrabold text-cyan-400 orbitron">Mbps</span>
                <span id="statusBadge" class="text-[10px] text-amber-400 font-bold bg-amber-950/60 px-2 py-0.5 rounded-full border border-amber-500/30">في الانتظار</span>
            </div>
        </div>

        <div class="w-full max-w-xs bg-slate-900 rounded-full h-2 mt-4 mb-8 overflow-hidden border border-slate-800">
            <div id="progressBar" class="bg-cyan-400 h-full w-0 transition-all duration-75"></div>
        </div>
