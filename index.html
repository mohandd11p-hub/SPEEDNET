<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedPulse - فحص السرعة السريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050a15;
            --card-bg: rgba(12, 22, 45, 0.7);
            --border: rgba(0, 229, 255, 0.2);
            --cyan: #00e5ff;
            --green: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 35px 35px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* نمط الرقم الضخم مثل Fast */
        .fast-speed-number {
            font-size: clamp(4.5rem, 18vw, 7.5rem);
            line-height: 1;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 30%, #00e5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .reload-btn {
            border: 2px solid var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.08);
            transition: all 0.2s ease;
        }
        .reload-btn:active {
            transform: scale(0.92);
            background: rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body class="relative z-10 min-h-screen p-4 flex flex-col justify-between max-w-xl mx-auto w-full">
    <div class="bg-grid"></div>

    <header class="flex items-center justify-between pt-2 pb-4">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-cyan-400 orbitron tracking-wider">SpeedPulse</h1>
            <i class="fas fa-bolt text-cyan-400 text-lg"></i>
        </div>
        <button onclick="restartTest()" class="reload-btn w-10 h-10 rounded-full flex items-center justify-center text-lg">
            <i class="fas fa-rotate-right" id="reloadIcon"></i>
        </button>
    </header>

    <main class="my-auto flex flex-col items-center justify-center text-center py-6">
        <p class="text-xs text-slate-400 mb-2 font-bold tracking-widest uppercase">سرعة التنزيل الحالية</p>
        
        <div class="flex items-baseline justify-center gap-2 my-2">
            <span id="speedVal" class="fast-speed-number orbitron">0.0</span>
            <div class="text-right">
                <span class="block text-xl font-extrabold text-cyan-400 orbitron">Mbps</span>
                <span id="statusBadge" class="text-[10px] text-emerald-400 font-bold bg-emerald-950/60 px-2 py-0.5 rounded-full border border-emerald-500/30">جاري القياس...</span>
            </div>
        </div>

        <div class="w-full max-w-xs bg-slate-900/80 rounded-full h-1.5 mt-4 mb-8 overflow-hidden border border-slate-800">
            <div id="progressBar" class="bg-gradient-to-r from-cyan-500 to-emerald-400 h-full w-0 transition-all duration-150"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 w-full">
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-arrow-up text-emerald-400 ml-1"></i>الرفع</div>
                <div id="ulVal" class="text-lg font-bold text-emerald-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">Mbps</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-stopwatch text-amber-400 ml-1"></i>البينغ</div>
                <div id="pingVal" class="text-lg font-bold text-amber-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-wave-square text-purple-400 ml-1"></i>الاهتزاز</div>
                <div id="jitterVal" class="text-lg font-bold text-purple-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
        </div>

        <div class="glass-card p-3 w-full mt-4 text-xs text-right space-y-1">
            <div class="flex justify-between items-center text-slate-400">
                <span>المزود (ISP):</span>
                <span id="ispVal" class="text-slate-200 font-bold">جاري الجلب...</span>
            </div>
            <div class="flex justify-between items-center text-slate-400">
                <span>العنوان (IP):</span>
                <span id="ipVal" class="text-slate-200 font-mono">--</span>
            </div>
        </div>
    </main>

    <footer class="py-3 text-center flex flex-col items-center justify-center gap-1.5 border-t border-slate-800/80">
        <div class="w-10 h-10 rounded-full bg-slate-900 border border-cyan-500/30 flex items-center justify-center p-1 shadow-[0_0_12px_rgba(0,229,255,0.2)]">
            <svg viewBox="0 0 200 200" class="w-full h-full">
                <circle cx="100" cy="100" r="95" fill="none" stroke="#e2e8f0" stroke-width="4"/>
                <path d="M 60,110 C 50,60 120,40 140,70 C 160,100 120,130 90,140" fill="none" stroke="#0088cc" stroke-width="16" stroke-linecap="round"/>
                <path d="M 85,75 L 145,135 M 145,135 L 120,135 M 145,135 L 145,110" fill="none" stroke="#ff8c00" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 70,120 C 80,150 120,160 150,145" fill="none" stroke="#00a8ff" stroke-width="12" stroke-linecap="round"/>
            </svg>
        </div>
        <p class="text-[11px] font-bold text-cyan-400">تم التطوير من فريق UROXA</p>
    </footer>

    <script>
        let abortCtrl = null;
        let isRunning = false;

        // بدء الفحص تلقائياً بمجرد فتح الصفحة (مثل Fast.com)
        document.addEventListener('DOMContentLoaded', () => {
            fetchNetworkInfo();
            startFastTest();
        });

        function restartTest() {
            if (isRunning && abortCtrl) abortCtrl.abort();
            const icon = document.getElementById('reloadIcon');
            icon.classList.add('fa-spin');
            setTimeout(() => icon.classList.remove('fa-spin'), 1000);
            startFastTest();
        }

        async function startFastTest() {
            isRunning = true;
            abortCtrl = new AbortController();

            // إعادة تعيين الواجهة
            document.getElementById('speedVal').innerText = '0.0';
            document.getElementById('ulVal').innerText = '--';
            document.getElementById('pingVal').innerText = '--';
            document.getElementById('jitterVal').innerText = '--';
            document.getElementById('progressBar').style.width = '5%';
            document.getElementById('statusBadge').innerText = 'جاري القياس...';
            document.getElementById('statusBadge').className = 'text-[10px] text-amber-400 font-bold bg-amber-950/60 px-2 py-0.5 rounded-full border border-amber-500/30';

            try {
                // 1. فحص البينغ سريعاً
                runPingFast();

                // 2. فحص التنزيل التكيفي الموازي (نظام Fast)
                document.getElementById('progressBar').style.width = '20%';
                const finalDl = await runParallelDownloadFast();
                document.getElementById('speedVal').innerText = finalDl.toFixed(1);
                document.getElementById('progressBar').style.width = '70%';

                // 3. فحص الرفع
                document.getElementById('statusBadge').innerText = 'فحص الرفع...';
                const finalUl = await runUploadFast();
                document.getElementById('ulVal').innerText = finalUl.toFixed(1);

                // إتمام الفحص
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('statusBadge').innerText = 'مكتمل';
                document.getElementById('statusBadge').className = 'text-[10px] text-emerald-400 font-bold bg-emerald-950/60 px-2 py-0.5 rounded-full border border-emerald-500/30';
            } catch (err) {
                if (err.name !== 'AbortError') {
                    document.getElementById('statusBadge').innerText = 'تم الاكتفاء';
                }
            } finally {
                isRunning = false;
            }
        }

        // خوارزمية جلب البيانات المتوازية (Fast Algorithm)
        async function runParallelDownloadFast() {
            const testDuration = 6000; // 6 ثوانٍ للفحص
            const startTime = performance.now();
            let totalBytes = 0;
            
            // أحجام الحزم المتدرجة (تزداد تلقائياً لملء الأنبوب)
            const chunkSizes = [1000000, 5000000, 15000000, 25000000]; 

            const worker = async (threadId) => {
                let sizeIndex = 0;
                while (performance.now() - startTime < testDuration && isRunning) {
                    const bytesToFetch = chunkSizes[Math.min(sizeIndex, chunkSizes.length - 1)];
                    try {
                        const res = await fetch(`https://speed.cloudflare.com/__down?bytes=${bytesToFetch}&r=${Math.random()}`, {
                            cache: 'no-store',
                            signal: abortCtrl.signal
                        });
                        
                        const reader = res.body.getReader();
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            totalBytes += value.length;

                            const elapsedSec = (performance.now() - startTime) / 1000;
                            if (elapsedSec > 0.1) {
                                const currentMbps = (totalBytes * 8) / (elapsedSec * 1000000);
                                document.getElementById('speedVal').innerText = currentMbps.toFixed(1);
                                
                                // تحديث كسر التقدم
                                const prog = Math.min(20 + (elapsedSec / (testDuration / 1000)) * 50, 70);
                                document.getElementById('progressBar').style.width = `${prog}%`;
                            }

                            if (performance.now() - startTime >= testDuration || !isRunning) {
                                reader.cancel();
                                break;
                            }
                        }
                    } catch(e) { break; }
                    sizeIndex++;
                }
            };

            // تشغيل 4 اتصالات متوازية كحد أقصى للحصول على أقصى سرعة
            await Promise.all([worker(1), worker(2), worker(3), worker(4)]);

            const totalTime = (performance.now() - startTime) / 1000;
            return totalTime > 0 ? (totalBytes * 8) / (totalTime * 1000000) : 0;
        }

        async function runUploadFast() {
            const duration = 3500;
            const startTime = performance.now();
            let totalBytes = 0;
            const chunk = new Uint8Array(256 * 1024); // 256KB

            while (performance.now() - startTime < duration && isRunning) {
                try {
                    await fetch(`https://speed.cloudflare.
