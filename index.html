<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedPulse - فحص السرعة السريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050a15;
            --card-bg: rgba(12, 22, 45, 0.7);
            --border: rgba(0, 229, 255, 0.2);
            --cyan: #00e5ff;
            --green: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 35px 35px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .fast-speed-number {
            font-size: clamp(4.5rem, 18vw, 7.5rem);
            line-height: 1;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 30%, #00e5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .reload-btn {
            border: 2px solid var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.08);
            transition: all 0.2s ease;
        }
        .reload-btn:active {
            transform: scale(0.92);
            background: rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body class="relative z-10 min-h-screen p-4 flex flex-col justify-between max-w-xl mx-auto w-full">
    <div class="bg-grid"></div>

    <header class="flex items-center justify-between pt-2 pb-4">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black text-cyan-400 orbitron tracking-wider">SpeedPulse</h1>
            <i class="fas fa-bolt text-cyan-400 text-lg"></i>
        </div>
        <button onclick="restartTest()" class="reload-btn w-10 h-10 rounded-full flex items-center justify-center text-lg">
            <i class="fas fa-rotate-right" id="reloadIcon"></i>
        </button>
    </header>

    <main class="my-auto flex flex-col items-center justify-center text-center py-4">
        <p class="text-xs text-slate-400 mb-2 font-bold tracking-widest uppercase">سرعة التنزيل الحالية</p>
        
        <div class="flex items-baseline justify-center gap-2 my-2">
            <span id="speedVal" class="fast-speed-number orbitron">0.0</span>
            <div class="text-right">
                <span class="block text-xl font-extrabold text-cyan-400 orbitron">Mbps</span>
                <span id="statusBadge" class="text-[10px] text-amber-400 font-bold bg-amber-950/60 px-2 py-0.5 rounded-full border border-amber-500/30">جاري القياس...</span>
            </div>
        </div>

        <div class="w-full max-w-xs bg-slate-900/80 rounded-full h-1.5 mt-4 mb-8 overflow-hidden border border-slate-800">
            <div id="progressBar" class="bg-gradient-to-r from-cyan-500 to-emerald-400 h-full w-0 transition-all duration-200"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 w-full">
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-arrow-up text-emerald-400 ml-1"></i>الرفع</div>
                <div id="ulVal" class="text-lg font-bold text-emerald-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">Mbps</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-stopwatch text-amber-400 ml-1"></i>البينغ</div>
                <div id="pingVal" class="text-lg font-bold text-amber-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
            <div class="glass-card p-3 text-center">
                <div class="text-[11px] text-slate-400 mb-1"><i class="fas fa-wave-square text-purple-400 ml-1"></i>الاهتزاز</div>
                <div id="jitterVal" class="text-lg font-bold text-purple-400 orbitron">--</div>
                <div class="text-[9px] text-slate-500">ms</div>
            </div>
        </div>

        <div class="glass-card p-3 w-full mt-4 text-xs text-right space-y-1">
            <div class="flex justify-between items-center text-slate-400">
                <span>المزود (ISP):</span>
                <span id="ispVal" class="text-slate-200 font-bold">جاري الجلب...</span>
            </div>
            <div class="flex justify-between items-center text-slate-400">
                <span>العنوان (IP):</span>
                <span id="ipVal" class="text-slate-200 font-mono">--</span>
            </div>
        </div>
    </main>

    <footer class="py-3 text-center flex flex-col items-center justify-center gap-1.5 border-t border-slate-800/80">
        <div class="w-12 h-12 rounded-full bg-slate-900 border border-cyan-500/30 flex items-center justify-center p-1.5 shadow-[0_0_12px_rgba(0,229,255,0.25)]">
            <svg viewBox="0 0 500 500" class="w-full h-full">
                <defs>
                    <linearGradient id="uxBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00b4d8" />
                        <stop offset="100%" stop-color="#0077b6" />
                    </linearGradient>
                    <linearGradient id="uxOrange" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffb703" />
                        <stop offset="100%" stop-color="#fb8500" />
                    </linearGradient>
                </defs>
                <circle cx="250" cy="250" r="230" fill="none" stroke="#e2e8f0" stroke-width="8"/>
                <path d="M 120,230 C 100,120 280,80 340,150 C 390,210 320,300 220,330 C 150,350 110,290 120,230 Z" fill="none" stroke="url(#uxBlue)" stroke-width="36" stroke-linecap="round"/>
                <path d="M 180,180 L 320,320 M 320,320 L 260,320 M 320,320 L 320,260" fill="none" stroke="url(#uxOrange)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="text-[11px] font-bold text-cyan-400">تم التطوير من فريق UROXA</p>
    </footer>

    <script>
        let isTesting = false;
        let activeXHRs = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchNetworkInfo();
            startFastEngine();
        });

        function restartTest() {
            stopAllConnections();
            const icon = document.getElementById('reloadIcon');
            icon.classList.add('fa-spin');
            setTimeout(() => icon.classList.remove('fa-spin'), 1000);
            startFastEngine();
        }

        function stopAllConnections() {
            isTesting = false;
            activeXHRs.forEach(xhr => { try { xhr.abort(); } catch(e){} });
            activeXHRs = [];
        }

        async function startFastEngine() {
            stopAllConnections();
            isTesting = true;

            // إعادة ضبط البيانات
            document.getElementById('speedVal').innerText = '0.0';
            document.getElementById('ulVal').innerText = '--';
            document.getElementById('pingVal').innerText = '--';
            document.getElementById('jitterVal').innerText = '--';
            document.getElementById('progressBar').style.width = '10%';
            document.getElementById('statusBadge').innerText = 'جاري القياس...';
            document.getElementById('statusBadge').className = 'text-[10px] text-amber-400 font-bold bg-amber-950/60 px-2 py-0.5 rounded-full border border-amber-500/30';

            // 1. البينغ
            runFastPing();

            // 2. التحميل التكيفي السريع (Fast System)
            const finalSpeed = await runFastDownload();
            if (!isTesting) return;

            document.getElementById('speedVal').innerText = finalSpeed.toFixed(1);
