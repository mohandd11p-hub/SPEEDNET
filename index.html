<div id="weather-widget" style="font-family: inherit; color: inherit; padding: 15px; background: transparent; border: 1px solid rgba(128,128,128,0.2); border-radius: 10px;">
    <h3 id="location-name" style="margin-top: 0;">جاري تحديد موقعك وجلب البيانات... 🌍</h3>
    <p>🕒 <strong>الوقت والتاريخ:</strong> <span id="current-datetime"></span></p>
    <p>🌡️ <strong>درجة الحرارة:</strong> <span id="current-temp">-</span></p>
    <p>💨 <strong>سرعة الرياح:</strong> <span id="current-wind">-</span></p>
    <p>🌧️ <strong>نسبة هطول الأمطار:</strong> <span id="current-rain">-</span></p>
</div>

<script>
    // 1. تحديث الوقت والتاريخ بشكل حي
    function updateDateTime() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('current-datetime').innerText = now.toLocaleDateString('ar-IQ', options);
    }
    setInterval(updateDateTime, 1000); 
    updateDateTime();

    // 2. دالة لجلب الطقس بناءً على الإحداثيات
    async function fetchWeather(lat, lon) {
        try {
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=precipitation_probability&timezone=auto`);
            const data = await response.json();

            document.getElementById('location-name').innerText = "طقس منطقتك الحالية 📍";
            document.getElementById('current-temp').innerText = data.current_weather.temperature + " °C";
            document.getElementById('current-wind').innerText = data.current_weather.windspeed + " كم/ساعة";
            
            const currentHourIndex = new Date().getHours();
            const rainChance = data.hourly.precipitation_probability[currentHourIndex];
            document.getElementById('current-rain').innerText = rainChance + " %";
        } catch (error) {
            document.getElementById('location-name').innerText = "حدث خطأ في جلب بيانات الطقس.";
        }
    }

    // 3. استخدام GPS لتحديد موقع الزائر
    function getUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    fetchWeather(lat, lon);
                },
                (error) => {
                    // في حال رفض الزائر إعطاء الصلاحية أو حدث خطأ، نعود لطقس بغداد أو الديوانية كافتراضي
                    document.getElementById('location-name').innerText = "لم يتمكن الموقع من تحديد مكانك (الطقس الافتراضي)";
                    fetchWeather(31.9922, 44.9258); // إحداثيات الديوانية
                }
            );
        } else {
            document.getElementById('location-name').innerText = "متصفحك لا يدعم تحديد الموقع.";
            fetchWeather(31.9922, 44.9258);
        }
    }

    getUserLocation();
</script>
