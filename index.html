<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UROXA | AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #020617; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .active-nav { background: rgba(56, 189, 248, 0.2); border-right: 4px solid #38bdf8; }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-200">

    <!-- الشريط الجانبي -->
    <aside class="w-20 lg:w-72 glass-panel flex flex-col p-4">
        <div class="text-sky-400 text-3xl font-black mb-10 text-center">UROXA</div>
        <nav class="space-y-4">
            <button onclick="showPage('chat')" id="btn-chat" class="flex items-center gap-4 w-full p-3 rounded-xl active-nav">
                <span class="text-2xl">🤖</span> <span class="hidden lg:block">الدردشة</span>
            </button>
            <button onclick="showPage('speed')" id="btn-speed" class="flex items-center gap-4 w-full p-3 rounded-xl hover:bg-sky-500/10">
                <span class="text-2xl">⚡</span> <span class="hidden lg:block">فحص السرعة</span>
            </button>
        </nav>
    </aside>

    <!-- منطقة المحتوى -->
    <main class="flex-1 flex flex-col p-4 lg:p-8">
        <!-- صفحة الدردشة -->
        <div id="page-chat" class="flex-1 flex flex-col h-full">
            <div id="chat-window" class="flex-1 glass-panel rounded-3xl p-6 mb-6 overflow-y-auto">
                <div class="flex gap-4 mb-6">
                    <div class="w-10 h-10 rounded-full bg-sky-500 flex items-center justify-center font-bold">U</div>
                    <div class="bg-slate-800 p-4 rounded-2xl">أهلاً بك في UROXA. كيف أساعدك اليوم؟</div>
                </div>
            </div>
            <div class="glass-panel rounded-2xl p-2 flex gap-2">
                <input id="chat-input" type="text" placeholder="اكتب استفسارك..." class="flex-1 bg-transparent p-3 outline-none">
                <button onclick="sendMessage()" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded-xl">إرسال</button>
            </div>
        </div>

        <!-- صفحة فحص السرعة (مخفية افتراضياً) -->
        <div id="page-speed" class="hidden flex-1 flex flex-col items-center justify-center glass-panel rounded-3xl p-8">
            <h2 class="text-3xl font-bold mb-8">اختبار سرعة UROXA</h2>
            <div id="speed-value" class="text-6xl font-black text-sky-400 mb-6">0.0</div>
            <p class="mb-8">Mbps</p>
            <button onclick="startSpeedTest()" class="bg-sky-500 hover:bg-sky-600 px-12 py-4 rounded-full font-bold">ابدأ الفحص</button>
        </div>
    </main>

    <script>
        // منطق التبديل بين الصفحات
        function showPage(page) {
            document.getElementById('page-chat').classList.toggle('hidden', page !== 'chat');
            document.getElementById('page-speed').classList.toggle('hidden', page !== 'speed');
            document.getElementById('btn-chat').classList.toggle('active-nav', page === 'chat');
            document.getElementById('btn-speed').classList.toggle('active-nav', page === 'speed');
        }

        // منطق الدردشة
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            const chat = document.getElementById('chat-window');
            chat.innerHTML += `<div class="flex flex-row-reverse gap-4 mb-6"><div class="bg-sky-900 p-4 rounded-2xl">${input.value}</div></div>`;
            input.value = "";
        }

        // منطق فحص السرعة
        function startSpeedTest() {
            const speedEl = document.getElementById('speed-value');
            let speed = 0;
            const interval = setInterval(() => {
                speed += Math.random() * 10;
                speedEl.textContent = speed.toFixed(1);
                if (speed >= 85) clearInterval(interval);
            }, 100);
        }
    </script>
</body>
</html>
