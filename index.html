<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FTTH - إدارة الشبكة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #003366; --accent: #00d2ff; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* القائمة العلوية */
        .top-bar { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-btn { font-size: 28px; cursor: pointer; color: white; margin-left: 10px; }
        
        /* القائمة الجانبية */
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: var(--primary); transition: 0.3s; z-index: 1000; padding-top: 60px; overflow-x: hidden; }
        .sidebar a { padding: 20px 25px; text-decoration: none; font-size: 18px; color: white; display: block; border-bottom: 1px solid #004a94; }
        .sidebar a:hover { background: #004a94; }
        
        /* الصفحات */
        .page { padding: 20px; display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #map { height: 400px; width: 100%; border-radius: 10px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight:bold; font-size: 18px;">إدارة شبكة FTTH</div>
        <div class="menu-btn" onclick="toggleNav()">⋮</div>
    </div>

    <div id="sidebar" class="sidebar">
        <a href="#" onclick="showPage('add-page')">🏠 إضافة مشترك</a>
        <a href="#" onclick="showPage('list-page')">📋 المشتركين</a>
        <a href="#" onclick="showPage('map-page')">🗺️ خريطة المشتركين</a>
        <a href="#" onclick="showPage('poles-page')">🔌 خريطة الأعمدة</a>
    </div>

    <!-- الصفحة 1: الإضافة -->
    <div id="add-page" class="page active">
        <div class="card">
            <h3>إضافة مشترك جديد</h3>
            <input type="text" id="name" placeholder="اسم المشترك">
            <input type="tel" id="phone" placeholder="رقم الهاتف">
            <input type="text" id="pole" placeholder="اسم العمود/البوكس">
            <input type="date" id="end" title="تاريخ الانتهاء">
            <input type="text" id="lat" placeholder="إحداثيات الموقع (GPS)" readonly style="background:#f9f9f9;">
            <button onclick="getLocation()" class="btn" style="background:var(--primary);">📍 التقاط الموقع الحالي</button>
            <button onclick="saveUser()" class="btn" style="background:#2a9d8f;">💾 حفظ المشترك</button>
        </div>
    </div>

    <!-- الصفحة 2: قائمة المشتركين -->
    <div id="list-page" class="page">
        <input type="text" id="search" placeholder="🔍 ابحث عن اسم المشترك..." onkeyup="renderList()">
        <div class="card">
            <table id="userTable"></table>
        </div>
    </div>

    <!-- الصفحة 3: الخريطة العامة -->
    <div id="map-page" class="page">
        <div class="card"><h3>خريطة المشتركين</h3><div id="mapUsers"></div></div>
    </div>

    <!-- الصفحة 4: خريطة الأعمدة -->
    <div id="poles-page" class="page">
        <div class="card"><h3>خريطة الأعمدة (البوكسات)</h3><div id="mapPoles"></div></div>
    </div>

    <script>
        function toggleNav() { document.getElementById("sidebar").style.width = document.getElementById("sidebar").style.width === "250px" ? "0" : "250px"; }
        
        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleNav();
            if(id === 'map-page') renderMap('mapUsers', false);
            if(id === 'poles-page') renderMap('mapPoles', true);
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('lat').value = `${pos.coords.latitude},${pos.coords.longitude}`;
                alert("✅ تم تحديد الموقع");
            });
        }

        function saveUser() {
            const u = { id: Date.now(), name: document.getElementById('name').value, phone: document.getElementById('phone').value, pole: document.getElementById('pole').value, end: document.getElementById('end').value, lat: document.getElementById('lat').value };
            if(!u.name || !u.lat) { alert("⚠️ أدخل البيانات أولاً"); return; }
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push(u);
            localStorage.setItem('users', JSON.stringify(users));
            alert("تم الحفظ!"); location.reload();
        }

        function renderList() {
            const filter = document.getElementById('search').value.toLowerCase();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            document.getElementById('userTable').innerHTML = users.filter(u => u.name.toLowerCase().includes(filter)).map(u => 
                `<tr><td>${u.name}</td><td><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${u.lat}')">🗺️</button></td></tr>`
            ).join('');
        }

        function renderMap(elementId, isPoles) {
            document.getElementById(elementId).innerHTML = "<div id='map'></div>";
            const map = L.map('map').setView([31.986, 44.920], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if(isPoles) {
                const uniquePoles = [...new Map(users.map(item => [item.pole, item])).values()];
                uniquePoles.forEach(u => L.marker(u.lat.split(',')).addTo(map).bindPopup("البوكس: " + u.pole));
            } else {
                users.forEach(u => L.marker(u.lat.split(',')).addTo(map).bindPopup(u.name));
            }
        }
        renderList();
    </script>
</body>
</html>
