<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FTTH PRO - نظام الإدارة الذكي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --bg: #020617; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        /* واجهة تسجيل الدخول */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b, #020617); }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--accent); color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* واجهة النظام */
        #app-container { display: none; }
        .header { background: var(--primary); padding: 25px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .nav { display: flex; justify-content: space-around; padding: 15px; background: #fff; margin: 20px; border-radius: 15px; color: #334155; }
        .page { padding: 0 20px; display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; color: #334155; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .map-btn { background: var(--accent); color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h3>🔐 بوابة الدخول الآمنة</h3>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="login()">دخول إلى النظام</button>
        </div>
    </div>

    <div id="app-container">
        <div class="header"><h3>FTTH PRO - نظام إدارة المشتركين</h3></div>
        
        <div class="nav">
            <button onclick="showPage('add-page')" style="background:none; border:none; cursor:pointer; font-weight:bold;">🏠 إضافة</button>
            <button onclick="showPage('list-page'); renderList()" style="background:none; border:none; cursor:pointer; font-weight:bold;">📋 المشتركين</button>
        </div>

        <div id="add-page" class="page active">
            <div class="card">
                <h3 id="formTitle">بيانات مشترك جديد</h3>
                <input type="hidden" id="editId">
                <input type="text" id="name" placeholder="اسم المشترك">
                <input type="text" id="username" placeholder="اسم المستخدم">
                <input type="text" id="password" placeholder="كلمة المرور">
                <input type="text" id="pole" placeholder="اسم البوكس">
                <input type="text" id="coords" placeholder="الإحداثيات (GPS)" readonly>
                <button class="btn" style="background:#64748b;" onclick="getLocation()">📍 جلب موقعي الحالي</button>
                <button id="saveBtn" class="btn" style="background:var(--accent);" onclick="saveUser()">💾 حفظ البيانات</button>
            </div>
        </div>

        <div id="list-page" class="page">
            <input type="text" id="search" placeholder="🔍 بحث عن مشترك بالاسم..." onkeyup="renderList()" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:10px; margin-bottom:15px;">
            <div id="userTable"></div>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('user').value === "1" && document.getElementById('pass').value === "2442") {
                sessionStorage.setItem('isLoggedIn', 'true');
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
            } else { alert("❌ بيانات دخول خاطئة!"); }
        }

        window.onload = () => {
            if(sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
            }
        };

        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('coords').value = `${pos.coords.latitude},${pos.coords.longitude}`;
                alert("✅ تم تحديد الموقع");
            }, () => alert("❌ فشل تحديد الموقع"));
        }

        function saveUser() {
            const id = document.getElementById('editId').value;
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const u = { 
                id: id ? parseInt(id) : Date.now(), 
                name: document.getElementById('name').value, 
                username: document.getElementById('username').value, 
                password: document.getElementById('password').value, 
                pole: document.getElementById('pole').value,
                coords: document.getElementById('coords').value 
            };
            if(!u.name) { alert("⚠️ أدخل الاسم"); return; }
            if(id) users = users.map(item => item.id == id ? u : item);
            else users.push(u);
            localStorage.setItem('users', JSON.stringify(users));
            alert("تم الحفظ بنجاح!"); location.reload();
        }

        function renderList() {
            const filter = document.getElementById('search').value.toLowerCase();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            document.getElementById('userTable').innerHTML = users.filter(u => u.name.toLowerCase().includes(filter)).map(u => 
                `<div class="card">
                    <strong>${u.name}</strong><br>
                    <small>بوكس: ${u.pole} | يوزر: ${u.username}</small>
                    <a href="https://www.google.com/maps/search/?api=1&query=${u.coords}" target="_blank" class="map-btn">🗺️ فتح في Google Maps</a>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="editUser(${u.id})" style="flex:1; padding:8px; background:#f1f5f9; border:none; border-radius:5px; cursor:pointer;">✏️</button>
                        <button onclick="deleteUser(${u.id})" style="flex:1; padding:8px; background:#fee2e2; border:none; border-radius:5px; color:red; cursor:pointer;">🗑️</button>
                    </div>
                </div>`
            ).join('');
        }

        function editUser(id) {
            const u = JSON.parse(localStorage.getItem('users')).find(x => x.id === id);
            document.getElementById('editId').value = u.id;
            document.getElementById('name').value = u.name;
            document.getElementById('username').value = u.username;
            document.getElementById('password').value = u.password;
            document.getElementById('pole').value = u.pole;
            document.getElementById('coords').value = u.coords;
            showPage('add-page');
        }

        function deleteUser(id) {
            if(confirm("⚠️ حذف المشترك؟")) {
                let users = JSON.parse(localStorage.getItem('users')).filter(u => u.id !== id);
                localStorage.setItem('users', JSON.stringify(users));
                renderList();
            }
        }
    </script>
</body>
</html>
