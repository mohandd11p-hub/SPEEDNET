<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="chat-window" class="flex-1 overflow-y-auto mb-20 space-y-4">
        <div class="bg-[#1a1a1a] p-4 rounded-2xl max-w-[80%]">أهلاً بك! أنا UROXA. كيف أساعدك؟</div>
    </div>

    <!-- حقل الإدخال -->
    <div class="fixed bottom-4 left-4 right-4 max-w-[700px] mx-auto bg-[#202020] p-2 rounded-full border border-zinc-700 flex items-center">
        <input id="user-input" type="text" placeholder="اكتب استفساراً..." class="flex-1 bg-transparent p-3 outline-none px-4">
        <button id="send-btn" class="p-3 bg-white text-black rounded-full">ارسل</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        document.getElementById('send-btn').addEventListener('click', () => {
            const message = input.value.trim();
            if (!message) return;

            // 1. إضافة رسالتك (يمين)
            chatWindow.innerHTML += `<div class="text-right p-3 bg-sky-900 rounded-2xl ml-auto max-w-[80%]">${message}</div>`;
            input.value = "";

            // 2. الرد (يسار)
            setTimeout(() => {
                chatWindow.innerHTML += `<div class="text-right p-3 bg-[#1a1a1a] rounded-2xl mr-auto max-w-[80%]">UROXA: استلمت طلبك: "${message}". أنا أحلل الآن...</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 500);
        });
    </script>
</body>
</html>
