<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedPulse - فحص السرعة التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #050a15;
            --card-bg: rgba(12, 22, 45, 0.85);
            --border: rgba(0, 229, 255, 0.25);
            --cyan: #00e5ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .fast-number {
            font-size: clamp(4.5rem, 16vw, 7rem);
            line-height: 1;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.35);
            transition: text-shadow 0.2s ease;
        }

        .fast-number.testing {
            animation: pulseGlow 0.8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
            100% { text-shadow: 0 0 30px rgba(0, 229, 255, 0.7); }
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .reload-btn {
            border: 2px solid var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.1);
            transition: all 0.2s ease;
        }
        .reload-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="relative z-10 min-h-screen
