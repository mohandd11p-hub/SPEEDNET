<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UROXA | AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="chat-window" class="flex-1 overflow-y-auto mb-20 space-y-4">
        <div class="bg-[#1a1a1a] p-4 rounded-2xl max-w-[80%]">أهلاً بك! أنا UROXA. كيف أساعدك اليوم؟</div>
    </div>

    <div class="fixed bottom-4 left-4 right-4 max-w-[700px] mx-auto bg-[#202020] p-2 rounded-full border border-zinc-700 flex items-center">
        <input id="user-input" type="text" placeholder="اكتب استفسارك..." class="flex-1 bg-transparent p-3 outline-none px-4">
        <button id="send-btn" class="p-3 bg-white text-black rounded-full">إرسال</button>
    </div>

    <script>
        const API_KEY = "ضع_مفتاحك_هنا"; // ضع مفتاحك الجديد هنا
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        async function fetchAIResponse(message) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
            });
            if (!response.ok) throw new Error("فشل الاتصال بـ API");
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const message = input.value.trim();
            if (!message) return;

            chatWindow.innerHTML += `<div class="text-right p-3 bg-sky-900 rounded-2xl ml-auto max-w-[80%]">${message}</div>`;
            input.value = "";
            
            // إضافة مؤشر تحميل
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "text-left p-3 text-sm text-gray-500";
            loadingDiv.innerText = "جاري التفكير...";
            chatWindow.appendChild(loadingDiv);

            try {
                const reply = await fetchAIResponse(message);
                chatWindow.removeChild(loadingDiv);
                chatWindow.innerHTML += `<div class="text-right p-3 bg-[#1a1a1a] rounded-2xl mr-auto max-w-[80%] whitespace-pre-line">UROXA: ${reply}</div>`;
            } catch (err) {
                loadingDiv.innerText = "خطأ: تأكد من مفتاح API أو جرب مفتاحاً جديداً.";
                loadingDiv.className = "text-red-500 p-2";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
