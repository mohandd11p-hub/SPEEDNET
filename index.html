<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UROXA | AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .modern-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; }
        .input-glow:focus { outline: none; border: 1px solid #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="mb-8 text-center">
        <h1 class="text-4xl font-black text-sky-400 tracking-tighter">UROXA.AI</h1>
        <p class="text-slate-400 text-sm">نظام الذكاء الاصطناعي المتطور</p>
    </div>

    <div class="modern-card w-full max-w-lg p-6 shadow-2xl">
        <div id="display-area" class="h-64 overflow-y-auto mb-6 bg-slate-950 p-4 rounded-xl border border-slate-800">
            <p class="text-sky-300">UROXA: مرحباً، أنا جاهز للبدء. ماذا تريد أن نحلل اليوم؟</p>
        </div>

        <div class="flex gap-2">
            <input id="user-input" type="text" placeholder="اكتب سؤالك..." class="input-glow flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700">
            <button onclick="handleInput()" class="bg-sky-500 px-6 py-2 rounded-xl font-bold text-black hover:bg-sky-400">إرسال</button>
        </div>
    </div>

    <script>
        function handleInput() {
            const input = document.getElementById('user-input');
            const display = document.getElementById('display-area');
            if (input.value.trim() === "") return;

            // إضافة رسالة المستخدم
            display.innerHTML += `<p class="text-right text-slate-300 mt-2">أنت: ${input.value}</p>`;
            
            // رد UROXA
            setTimeout(() => {
                display.innerHTML += `<p class="text-sky-400 mt-2">UROXA: قمت بمعالجة طلبك: "${input.value}" بنجاح.</p>`;
                display.scrollTop = display.scrollHeight;
            }, 500);

            input.value = "";
        }
    </script>
</body>
</html>
