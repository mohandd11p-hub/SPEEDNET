<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت التداول الخاص بي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <h2>لوحة تحكم البوت</h2>
        <div class="stats-grid">
            <div class="card"><h3>الحالة</h3><p id="bot-status">متوقف</p></div>
            <div class="card"><h3>السعر الحالي</h3><p id="current-price">0.00</p></div>
        </div>
        <div class="controls">
            <button onclick="startBot()" class="btn-start">تشغيل البوت</button>
            <button onclick="stopBot()" class="btn-stop">إيقاف</button>
        </div>
        <div id="log-box" class="logs"><h4>سجل الأحداث</h4></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
